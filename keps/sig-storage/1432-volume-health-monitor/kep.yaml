# Target maturity stage in the current dev cycle. The original alpha
# (v1.21) shipped under a different API shape that is being removed
# from the CSI spec; this KEP is the redesigned replacement and is
# resetting graduation to alpha.
stage: alpha

latest-milestone: "v1.37"

milestone:
  alpha: "v1.37"
  beta: "v1.39"
  stable: "v1.41"

feature-gates:
  - name: CSIVolumeHealth
    components:
      - kube-apiserver
      - kubelet
disable-supported: true

metrics:
  - csi_volume_health_probe_duration_seconds
  - csi_volume_health_probe_total
  - csi_volume_health_status
  - csi_storage_health_status
# Exact label sets are defined alongside the implementation, not
# in this KEP, so they can evolve without a KEP amendment.
